body:
  text: 五嶽內思刻名定仙上法太上九赤鎮嶽求仙班符東嶽青帝內思甲乙入木九氣班符東方青帝君姓常諱精萌頭建九元通天冠衣青錦帔碧飾飛裙佩太上九氣命靈之章帶翠羽交靈之綬常以立春之日乘碧霞九龍雲輿從青腰玉女十二人手把青林之華九色杖幡遊行東嶽太山校定真人仙官録札時詣東海水帝考算學道功過罪目回降佩符者身學者服其符以招其人存其氣以降其真求削水帝之簡上名玉札之篇當以立春之日平旦沐浴齋靜入室燒香服甲乙入木九氣班符叩齒九通思東方青帝君姓常諱精萌衣服形色乘碧霞雲輿下降兆房青氣鬱鬱覆蒲一室冠匝已形存見帝君青氣之中化為赤光如歲星之精赫赫照明從頭頂而下入兆身中光明洞映肝部之間便引氣九咽覺身中薰熱須臾赤光於內散從九孔中出回合還兆頭頂之上化成青雲覺兆身在青雲之中隨雲而升良久覺定豁如蹈空便仰呪曰太丹隱齋回合九門玄虛舉真赤班早分帶甲入木乘乙御雲上制五嶽封丘召山下告九河十二水源落除宿簡列奏玉篇掌録我真青帝之君降我碧霞飛青羽裙與帝合景奏謁玉晨畢又叩齒十二通咽液二十四遍止行之九年則能書符投山山降雲雨倏歘暗冥書符投水水上蛟龍能入萬丈之淵如行人中書符於木削之不滅其文轉明帶符抱木身成山林東嶽衛以仙官十二人一十八年則能飛行上清輕泄此道罰以鬼兵殃延七祖身沒河源太上甲乙入木九氣班符朱書立春之日平旦東向服之祝如上法又以正月二月甲寅乙卯之日青書桐板之上令廣九寸長一尺二寸埋之所住東嶽令深九尺甲乙唯一日也如此法三年一埋不必年年也但存思服御依節行之亦九年無不感降也此一名白羽中林飛天九符一名九變三合成一得見其文與五帝同真埋符之日當東向叩齒三十六通存思青氣之雲覆冠一山上下鬱冥東嶽太山君乘九色之龍手執青羽之麾從太山仙官十二人在青氣之內監映兆身仰祝曰天通地理二氣交真九赤陽明四度開陳上開五帝東嶽泰山下告萬靈無鞅之神削我宿對記我此篇滅消魔試使我成仙封賞靈嶽與氣同煙興雲降雨飛霄碧軒升入玄虛髙皇帝前畢埋符如式仰引青氣三十六咽止東嶽泰山君常以春分之日列奏真仙巳得道及始學之人名録上言髙上帝君檢校玄名修飛仙之道當以其日日出之時沐浴齋戒燒香入室東向思東嶽泰山君姓玄丘諱目陸頭建三寶九光夜冠衣青羽章裙披九色班裘帶上皇命神之篆乘青雲飛輿九色蒼龍從十二仙官手把五芝東北而回上登無崖之上玉清之天徘徊玄虛之內青雲之中當叩齒九通心言今日上節八願開新願回神曲來降我間納我所求奏我所陳得上玉札位係紫篇道君回映我獲上仙畢思泰山君乘輿下降青氣鬱鬱覆滿一室君處青氣之中手執青簡注上我名於青簡之篇微祝曰玉真徘徊煥明東方乘龍駕輿飛行太空回靈曲映下降我房青陽告始上願開通納我所陳削過記功刻名青簡列奏髙皇西龜結録東華勒方五靈輔翼八帝齊光來甲御乙出木入空六丁侍衛玉女扶將攝山召海命制蛟龍嘯風興雲靡不立躬天魔伏試萬靈敬從變景化形上升玉宫年享泰山永保無窮畢仰咽九氣止修之九年則泰山君見形於兆前降於青氣之雲給神童九人致自然神芝能知東方萬里之事一十八年則致龍輿乘空飛行上升玉清宫南嶽赤帝內思丙丁入火三氣班符南方赤帝君姓炎諱洞丹頭建三氣玄梁寶冠衣緋雲錦袍丹文之裙佩南極制陽之符帶朱宫八光之劍常以立夏之日乘赤霞飈輪從太丹玉女十二人乘九色之鳯手把日精三氣之華遊行南嶽衡山校定真人仙官録札及學者之名時詣南海水帝神王考算學道功過罪目回降佩符者身學者服其符以招其神存其氣以降其真削除水帝之簡上名玉札之篇當以立夏之日正中沐浴齋戒入室燒香服丙丁入火三氣班符叩齒三通思南方赤帝君諱字衣服形色乘赤霞飈輪下降兆房赤氣赫赫覆滿一室冠匝已形存見帝君在赤氣之中化為熒惑星赫赫照明從頭頂而下入兆身中光明洞映心宫之間便引氣三咽覺身薰熱須臾熒惑星於心散為赤氣從九孔中出回合還兆頭頂之上化成赤雲覺兆身在赤雲之中隨雲而升良久覺定豁如蹈空仰祝曰三氣回元飛天九清白羽中林入微洞靈帶丙耀光乘火入丁中真混合上化景星制御萬氣封山召靈符攝九河十二水精削滅九隂宿簡之名興雲降龍丹霄朱軿八景迅虛流火鬱冥飛輪紫蓋來運我形乘虛躡浮上造玉庭受錬洞陽五神鮮明永享天眉與帝合并畢又叩齒九通咽液十二過止行之九年則能書符投林林自生火書符投水水上蛟龍書符投山山降雲雨帶符入火身則不然埋符南嶽則得仙官侍衛兆身十八年則能飛行上升玉清輕泄此道殃延七祖身沒鬼官長閉地獄不得成仙太上丙丁入火三氣班符朱書立夏之日正中南向服之祝如上法又以四月五月丙午丁巳之日朱書桐板之上令廣八寸長一尺二寸埋之所住南嶽令深八尺丙丁唯一日也如此法三年一埋不年年也但存思服御依節行之亦九年赤帝君衡山君無不降見於兆形也此一名三合成道九真中符一名九合入微幽虛七變得見其文五帝齊真刻成上仙埋符之時當南向叩齒二十四通存思赤氣之雲覆冠一山之上南嶽衡山君乘赤龍雲車手執赤羽之節從衡山仙官十二人在赤氣之中監映兆身仰呪曰丹靈洞陽上總天逢九變三合乃成道宫赤景班符威御萬方令日上節三氣開通上關五帝告文靈峯削我宿負列名髙皇使我道成變化玄空封掌靈嶽召海䇿龍興雲降雨萬向立從飛霄赤輪升入帝房八氣并景三元齊光畢埋符如式仰引赤氣二十四咽止南嶽衡山君常以夏節之日列奏真仙巳得道及始學之人名録上言髙上帝君檢校玄名區别功過修飛仙之道當以其日日中之時沐浴齋戒入室燒香南向思南嶽衡山君姓爓諱洋光頭建八朗寶光玉冠衣赤錦飛裙披神光緋文之表帶封靈制魔之章乘赤霞飛輪從南嶽仙官十二人悉乘飛鳳手把神芝東南而回上登無崖之上玉清之天徘徊空虛之內赤雲之中當叩齒三通心言令日上吉良辰應真玄願普降竟天納新願乞道君值回上仙飛輪羽蓋下降我身道君回降我成帝臣名言上清東華結篇畢思衡山君乘赤霞飛輪下降兆房赤氣鬱鬱覆滿一室君在赤氣之中手執赤簡注上我名於赤簡之篇微祝曰朱陽乘晨徘徊九霄丹輿飛蓋洞煥霞寥曲回下映監我心翹上願所陳莫不感幽抑披靈衛形與神交書名丹臺結字南瑶六丙翼真乘丁入飈攝山封海命制萬祅千精伏竄羣魔皆消南嶽既掌三元來招降致朱軿升入皇朝三景齊靈後天而凋畢仰咽三氣止修之九年則衡山君授兆寶書給仙官八人降致神芝竒異之物能知南方萬里之事行之十八年則致赤雲之輪飛行太空上升玉清之宫西嶽白帝內思庚辛入金七氣班符西方白帝姓混諱辱歸頭建七氣明光寶冠衣白錦雲光之袍素錦飛裙佩素靈之綬龍潮漫誕之劍常以立秋之日乘素雲飛輿從太素玉女十二人白虎手把七色華幡遊行西嶽華山校定真人仙官録札及學者之名時詣西海水帝神王考算學道功過罪目回降佩符者身學者服其符以招其人存其氣以降其真削除水帝之簡上名玉札之篇當以立秋之日晡時沐浴齋靜入室燒香服庚辛入金七氣班符叩齒三通思西方白帝君諱字衣服形色乘紫雲飛輿下降兆房白氣奕奕覆滿一室冠匝巳形存見帝君在白氣之中化為太白星赫赫照明從頭頂而下入兆身中光明洞映肺部之間便引氣七咽覺身薰熱須臾太白星於肺中散為白氣從九孔中出回合還兆頭頂之上化成白雲覺兆身在白雲之中隨雲而升良久覺定豁如蹈空仰祝曰七氣飛精西華金靈龍變九道萬物自生日月過度飛羽陸冥幽虛玄真三合七成變化入景辛回景星帝諱符合變化我形上承皇威部御神兵制山檢海封嶽命精真不咸來受事我庭興雲起雨降致素軿九龍七虎䇿御六丁迅我飛虎出玄入青上造朱月金治錬明逍遙華堂長保天經畢又叩齒七通咽液三十二過止行之九年則能書名於石錬石成金書符投石石隱兆形書符投山山降素雲書符投水水上龍精埋符西嶽則給仙官降致自然神竒異物一十八年修行則能乘空飛升玉清輕泄此道罰以神兵七祖負考長役鬼官愼祕修行尅獲上仙太上庚辛入金七氣班符朱書立秋之日晡時西向服之祝如上法又以七月八月庚申辛酉之日朱書桐板之上令廣六寸長一尺二寸埋之所住西嶽令深六尺庚辛唯一日也如法三年一埋不年年也但存思服御依節行之爾九年白帝君及華山君無不降見於兆形也此一名九微入神封靈玄一名赤白自生七變金門得見此道西母降真萬變立成飛升帝神埋符之時當西向叩齒十二通存思白氣之雲覆冠一山之上西嶽華山君乘白龍雲車手執七色飛行羽節從華山仙官十二人在白氣之中監映兆身仰祝曰六氣徊靈三合成一五雲變化轉九會七帝尊混合神生金室是時何時上願之日所向所求靡不良吉命靈召神羣魔隨滅八道散明我真穆穆五嶽齊眉與帝相畢畢埋符如式仰白氣二十四咽止西嶽華山君常以秋分之日列奏真仙巳得道及始學之人名録上言髙上帝君檢校玄名區别功過修飛仙之道當以其日晡時沐浴齋靜入室燒香西向思華山君姓浩丘諱元倉頭建六元通神飛冠衣白錦飛裙披素錦之裘帶交靈素綬乘霞飛輪從西嶽仙官十二人悉乘十二白虎手把七色華幡西南而回上登無崖之上玉清之天徘徊空虛之內白雲之中當叩齒七通心言我願飛仙上升玉清飛入華嶽與帝同靈乞丐道君降我真形為我致仙書我玄名畢思華山君乘白霞飛輪下降兆房白氣奕奕覆滿一室君在白氣之中手執白簡注上我名於白簡之篇微祝曰金門煥明白雲巍峩四會交真八氣結羅上吉告晨帝靈升霞回神下降曲盻我家謂我白簡書名西華七真部仙制御羣魔上承皇威攝山命河興雲降雨龍輪立過運我飛虛上造靈阿所願立至所剪立嵯千變萬化洞明玄霞畢仰咽七氣止修之九年則華山君為兆致神仙之藥給仙童七人九年能明西方萬里之事吉凶之兆行之十八年降致白雲之輪飛行太空上升玉清之宫北嶽黑帝內思壬癸入水五氣班符北方黑帝君姓玄諱朔萌頭建五氣玄晨之冠衣玄錦之袍五色飛裙佩七元流鈴帶文身通神之劍常以立冬之日乘玄雲飛輿從太玄玉女十二人乘十二飛龜手把五色華幡遊行北嶽拒山校定真人仙官録札及學者之名時詣北海水帝神王考算學道功過罪目回降佩者身學者服其符以招其神存其氣以降其真削水帝之簡上名玉札之篇當以立冬之日夜半沐浴齋靜入室燒香服壬癸水五氣班符叩齒五通思北方黑帝君諱字衣服色形象乘玄雲飛輿下降兆房黑氣勃勃覆滿一室冠匝已形存見帝君在黑氣之中化為辰星赫赫照明從頭頂而下入兆身中光明洞映腎部之間便引氣五咽覺身薰熱須臾辰星於腎中散為黑氣從九孔中出回合還兆頭頂之上化成黑雲覺兆身在黑氣之中隨雲而升良久覺定豁如蹈空仰祝曰五神通真化氣廣陽七元回靈煥落北方帝尊告令入節御光上總萬仙下統無窮乘氣迅虛回降我房授我玄符變化流通帶壬入洞負癸升空封掌五嶽制命九江召山興雨符水上龍飛軿紫蓋升入帝宫畢又叩齒五通咽液十八過止行之九年則能書符投水水上蛟龍停流止波入水如空埋符北嶽則給仙官降致神藥不死之方一十八年坐在立亡乘虛飛行上升玉清其道髙妙不傳非真輕泄靈文七祖負考身沒鬼官長充幽徒不得又仙太上壬癸水五氣班符朱書立冬之日夜半北向服之祝如上法又以十月十一月壬子癸亥之日朱書桐板之上令廣五寸長一尺二寸埋之所住北嶽令深五尺壬癸唯一日也如此法三年一埋不年年也但存思服御依節行之爾九年黑帝君及恆山君降見於兆形也此一名交升雲門七變五合一名五靈玄隂中道萬畢有得此文仙道立成行之變景飛升紫清埋符之時當北向叩左齒二十四通存思黑氣之雲覆冠一山之上北嶽恆山君乘黑龍雲車手執五色飛仙羽節從恆山仙官十二人在黑氣之中監映兆身仰祝曰玄武交升五變成神三合九離乃會玉門上節八願我享其仙安氣鎮靈五嶽保令乘空命虛萬魔來身降致雲輿玄輦紫軒飛行太空上升帝晨長與北君保命天真畢埋符如式仰引黑氣二十四咽止北嶽恆山君常以冬至之日列奏真仙巳得道及始學之人名録上言髙上帝君檢校玄名區别功過修飛仙之道當以其日夜半沐浴齋靜入室燒香北向思恆山君姓伏諱通萌頭建五氣寶晨玉冠衣黑錦飛裙披玄文明光之裘帶交靈紫綬乘玄霞飛輪北嶽仙官十二人悉乘飛龜手把五色華憣西北而回上登無崖之上玉清之天徘徊空虛之內玄雲之中當叩齒五通心言今日上吉八節回還道君回降曲盻我身領掌命録長保天年畢思恆山君乘黑霞飛輪下降兆房黑氣勃勃覆滿一室君在黑氣之中手執紫簡注上我名於紫簡之篇微祝曰玄隂回靈乘日御晨五氣總真普統羣仙安景上宫徘徊雲陳曲降監映來我房軒書名玄簡記上玉篇使我通明洞徹入真制命五靈封河召山降龍起雨導雲興煙飛霄輕輪升入帝晨畢仰咽五氣止修之九年則恆山君為兆降致玄龍雲輿給以仙官五人招北方神真靈藥洞明北方未然之事吉凶之兆行之十八年飛行上清與北嶽帝君齊保玉真也中嶽黃帝內思戊巳入土一氣班符中央黃帝君姓麻諱忠慎頭建黃晨通天玉冠衣黃錦之袍玄黃飛雲錦裙佩黃帝越元之䇿帶靈飛紫綬常以太歲之日乘黃雲飛輿從黃素玉女十二人乘十二飛驎手把五帝華幡遊行中嶽嵩山校定真人仙官録札及學者之名時詣三河四海十二水帝神王考算學道功過罪目回降佩符者身學者服其符以招其神存其氣以降其真削字水帝之簡上名玉札之篇當以太歲之日中後沐浴齋靜入室燒香服戊已入土一氣班符叩齒十二通思中央黃帝君諱字衣服形色乘黃雲飛輿下降兆房黃氣鬱鬱覆滿一室冠匝已形存見帝君在黃氣之中化為鎮星赫赫照明從頭頂而下入兆身中光明洞映脾部之間便引氣十二咽覺身薰熱須臾鎮星於脾中散為黃氣從九孔中出回合還兆頭頂之上化成黃雲覺兆身在黃雲之中隨雲而升良久覺定豁如蹈空仰祝曰中靈黃元十二飛精五氣混化髙皇洞明是日上吉總攝萬靈檢録校札除罪結生回真流盻曲降我庭為我落死刻簡紫名輔我太真給我神兵匡制五嶽封山召靈羣魔滅試我道肅清乘戊負已洞入無形興雲降雨飛霄紫軿造晏五嶽與帝合并畢又叩齒十二通咽氣十二過止行之九年則知三十六國之音知萬淵之下三十六土皇形色書符把玉形與土合埋符中嶽則使黃素玉女十二人致自然之厨不死之藥行之十八年則能飛行玄虛上升玉清祕之神仙輕泄九祖獲考身負三徒充責幽冥太上戊已入土一氣班符朱書太歲之日日中後向四季服之祝如上法又以三月六月九月十二月戊辰戊戌已丑已未之日朱書桐板之上令廣三寸長一尺二寸埋之所住中央令深一尺二寸四季唯一日如此法三年一埋不年年也但存思服御依日而行之九年黃帝嵩髙山君無不降見於兆形也此一名玄真總暉自生萬度一名神飛九道靈變自然有得此道立升雲宫埋符之時當向四季叩齒十二通存思黃氣之雲覆冠一山之上中嶽山君乘黃龍雲車手執玄黃十二節麾從嵩髙山仙官十二人在黃氣之中監映兆身仰祝曰三素流飈黃雲五纏道合萬變玄虛舉真神安靈嶽道降我身黃白早分記名紫篇封山召河制御羣仙興雲降雨黃霄飛輪乘空步玄上升髙晨畢埋符如式仰行黃氣十二咽止中嶽嵩髙山君以三月六月九月十二月戊辰戊戌已丑已未之日列奏真仙已得道及始學之人名録上言髙上帝君檢校玄名區别功過修飛仙之道當以其日日中後沐浴齋靜入室燒香向四季思中嶽君姓角諱普生頭建中元黃晨玉冠衣黃錦飛裙披玄黃文裘帶黃神中皇之章乘黃霞飛輪從中嶽仙官十二人悉乘飛驎手把玄黃十二節麾西南而回上登無崖之上玉清宫徘徊空虛之中黃雲之內叩齒十二通心言天垂上願我享其恩念虛降靈思微致仙中嶽之君結我同軒使我飛行升到金門畢思嵩髙山君乘黃霞飛輪下降兆房黃氣勃勃覆滿一室君在黃氣之中手執黃簡注上我名於黃簡之上微祝曰黃靈中玄道翳紫天三合成一結虛而仙掌録保篇固命度年列名東華記仙中秦五靈監映使我道鮮出虛入微洞徹九玄身生水火變景億千乘空𡵯虛飛行無間畢仰咽十二氣止修之九年則與中嶽君對面共言為兆降致黃龍飛輿給以仙官取自然之物以與兆身行之十八年道成飛仙上升玉清四海水帝內思除罪削簡上法太上九赤封海通真班符東海水帝九源青氣班符太上九元青氣班符常以立春春分之日分平旦朱書青紙上東向服之行事訖朱書符桐板上記某年某月某日子某郡縣某鄉里某嶽先生某年若干歲某月生於符下以青石九兩青絲纏之著符下投之東流之水常以其日清齋入室燒香東向叩齒十二通思東海水帝神王姓王諱度源頭建太晨寶明之冠衣青文翠羽飛裙帶七色師子虎頭鞶囊乘碧輦飛龍從東海水帝十二仙掾乘十二蒼龍飛行上詣髙皇玉帝徘徊青雲回降我身青氣鬱鬱內外暗冥神王對坐我前削我死簡注我仙録微祝曰洞淵九源上參玉清分流二氣混合同生上總上真下典兆名是日良吉八願齊并水帝削罪記功上靈太一固年保命黃寧形交九都氣應神精左役天甲右運六丁命山召海降輿龍軿運我飛升上朝三清羽儀翼翼金璫玲玲徘徊𡵯空遊宴紫庭下觀水宫水受我形使我長存與劫同齡畢服符仰咽液九過止便依法投符東流之淵行之十八年水帝削兆罪簡言玉清降致龍軿飛行太空身入萬丈之淵與水帝對言玄妙之道不得妄宣也南海水帝洞源赤氣班符太上洞源赤氣班符常以立夏夏至之日正中朱書青紙上南向服之行事訖朱書符桐板上記某年某月某日子某郡縣某鄉里某嶽先生某年若干歲某月生於符下以赤石八兩赤絲纏之著符投於南流之水行其道常以其日清齋入室燒香南向叩齒十二通思南海水帝神王姓開諱納靈頭建太晨寶明之冠衣赤錦文裙帶交靈紫綬九色鞶囊乘蛟龍飛行雲輪從南海水帝十二仙掾乘十二飛龍上詣髙皇玉帝徘徊青雲回降我身青氣鬱冥神王對坐我前削我罪簡注我仙録微祝曰南陽赤淵萬谷洞泉帝君安鎮總領水仙挍定罪簡記功紫晨日吉時清匡龍䇿煙徘徊玄虛來降我軒與氣混合道成自然制魔滅精攝海封山六師啓道通我水源興雲降雨嘯命立前所願所啓靡不如言飛行上清朝謁玉晨畢仰咽氣八過止便依法投符南流之淵行之十八年水官無復罪目之簡神王列名於玉皇降致雲龍丹輿飛行太空登山涉海萬神衛迎洞微入玄與帝合真輕泄靈文罰以五帝神兵祕之者仙西海水帝洞淵白氣班符太上洞淵白氣班符常以立秋秋分之日晡時朱書青紙上西向服之行事訖朱書符桐板上記某年某月某日某郡縣某鄉里某嶽先生某年若干歲某日生於符下以白石六兩白絲纏之著符投於西流之水行其道當以其日清齋入室燒香西向叩齒十二通思西海水帝神王姓道諱洞清頭建太晨寶明之冠衣素錦飛裙帶素靈命神之章九色師虎頭鞶囊乘飛輿從西海水帝十二仙掾乘十二白虎飛行玄虛上詣髙皇玉帝徘徊玄空青雲之中回真下降對在我前削我罪簡注我仙録列奏玉帝之前微祝曰暘谷萬文洞淵九流十二帝府九江水侯上統玉虛下領神州是日上吉神王出遊掌我命籍保我玄符回真曲映來降我廬削我罪簡勒上天書道彂自然飈升雲輿混合元吉與帝并軀畢仰咽六氣止便依法投符西流之淵行之十八年則能洞行西海履萬丈之淵海神衛迎不拘水契降致龍輿飛行太虛水官削罪言名帝皇其道髙妙不行於世有見其文不學自仙北海水帝洞川黑氣班符太上洞川黑氣班符以立冬冬至之日夜半時朱書青紙上北向服之行事訖朱書符於桐板上記某年某月某日某郡縣某鄉里某嶽先生姓某年若干歲某月生於符下以黑石五兩黑絲纏之著符投於北流之水行其道當以其日清齋入室燒香北向叩齒十二通思北海水帝神王姓吸諱淵元頭建太晨寶明之冠衣玄錦飛裙帶豁落七元五色虎頭鞶囊乘玄霞飛輿從北海水帝十二仙掾乘十二飛龜遊行玄虛上詣髙皇玉帝徘徊玄靈之上鬱鬱青氣之中回真下降對在我前削我罪簡注我玉篇列言上清玉皇帝前便微祝曰天地分流四瀆御清三河水府九江帝靈檢定簡録結罪四明有道者功有過者刑今日上吉帝映我庭流真回降我仙自成三河四海來衛我形千變萬化應口立生飛行玄虛上升八冥長保三光天地齊停畢仰咽八氣止便依法投符北海之淵行之十八年命召水侯十二蛟龍運水興雲使白日暗冥飛行虛空上升玉清其法髙妙非真勿行違禁妄傳殃滅兆身考延七玄唯祕神仙太上九赤班符結飛玄紫氣以成其文上真帝君以封嶽召山攝江制靈其文洞微煥落上清元始天王藏之於瑶臺金房玉虛之中舊科七千年一傳自無金名玉字丹文玄臺不得參聞有見其文尅成上仙當依法八節之日服符禮祝并埋山投海九年之中則五嶽仙官侍衛兆身水帝水靈隨方伺迎五帝奏名玄宫水官落滅罪書龍降雲覆變化無方又當依常彩色書符佩身登山履川萬神衛形滅魔消試威制羣精五雲降室紫煙自生項負圎光內外洞明八景齊真三元降軿飛行玄虛上升玉清有金名玉骨寶字上清得有此符佩之三年便得為五嶽真人履川涉海便為四海君王五帝輔翼萬神敬迎修行其事九年則能水行萬丈制御蛟龍入山隱學則五帝五嶽見形共言興雲起雨立召龍煙千變萬化應響已成修之十八年飛行上清其道髙妙不行於世輕泄靈文七祖充責已身亡命長保鬼官受者弟子師對齋三十日或七日齎上金三兩五色文繒各五十尺錦四十尺上香一斤詣五嶽之巖告五帝關五靈三河四海天官地官水官依四極之盟然後而傳受者不關天靈侍經玉童玉女列奏髙上罰以五帝神兵輕泄者罰於九祖考滅巳身受而不盟殃延七祖身被風火自然失經故上元君告於五帝經非盟而不告受不關而失真彼此皆有生死之責學者宜依文而奉焉道無不降仙無不成生死享其慶福流於種親靈文至重斯道之極真也太上九赤班符五帝內真經
