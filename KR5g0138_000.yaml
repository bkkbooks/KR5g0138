  text: 太上九赤班符五帝内眞經通十一九赤班符一名羽中林飛天九符元始天王藏之於上清瑶臺金房玉室之中神眞煥明流光曜空四極監試五帝衛眞太上以雲宫玉童三百人上元又以西華玉女七百人侍典靈文神摽上清威嚴九天制魔滅袚馘斬羣凶封掌名山攝召水神總統億億領括萬仙五嶽四瀆及後學者身部以神兵罰過賞功九千年則九天一開九天開其文則明五嶽之室玄授得道之人自無仙骨玉名刻書來生不得見其篇目有得其文便爲五嶽之師宗四海之君王奉之者慶延七祖之魂福流九種之親修之者刻成上清髙仙眞人九赤者乃九元之炁飛玄羽章結成玉文元丈人以傳太上大道君元始天王以傳南極上元君太上以傳扶桑大帝太帝以傳太微天帝君太微天帝君以傳後聖金闕帝君以傳上相青童君南極上元君以傳洪崖先生太極四眞人炁炁相傳皆刻書金簡結以紫篇盛以雲錦之囊封以三元之章藏以鬱森之笈祕扵九曲之房玉仙典香太華執巾四司監暎五帝衛軒三元晏禮萬仙朝眞其道至妙依科七千年一傳輕泄宣露傳非其人七祖獲考身没河源後學勤心苦思求仙精誠感於太虚冥德合於三元玄挺應㑹自得此文得佩眞符始可渉歷於玄嶽託身於幽山役九赤以封丘命五行以招神俾水帝以削罪攝海靈以通源則罪籍滅落於九府生録刻注於三清炁震溟波威攝萬靈羣魔滅試仙官降形運䇿六甲制御天丁通幽徹微逆覩未生故能神仙飛行上清夫學不見九赤白羽中林飛天九符則五嶽不領玄名四海水神不爲兆削滅罪簡勒注三清也遊行川澤隱居幽山不佩此文則山靈天魔試敗其旨萬害自生終不成仙水帝結書列罪帝君也五嶽五帝内思變化眞形求仙上法凡入東嶽思東方青帝神閉眼即見眞形者其人則五宫結氣六藏生眞九府洞朗内無滯根和音震響妙理明通此人皆上仙之才也故道爲之即降神明爲之感㑹則仙不移年而成也若見青炁鬱鬱亦其方正神虚暎之炁也則道有漸也若見黒氣則上眞本生之號虚暎之官監試於兆身若見赤氣則洞生之官虚暎之炁來衞兆身也若見黄炁則嶽所使之官虚暎之炁来給兆通眞也此悉無恠依本而行事久久道自感而降焉若見白炁則天魔空中之精來千試兆身當叩左齒三十六通而誦金玄章之祝一遍則魔精自滅眞自來降也凡入南嶽思南方赤帝神閉眼即見眞形者其人則骨結玉霜炁參神宫丹臺刻簡結錄紫篇幽悟冥塗逸浪虚庭觸類無滯静思感眞此人皆上仙之才故道爲之即降神明爲之感㑹也如此則仙不移年而成若見赤炁亦其方正神虚暎之炁也則道有漸也若見青炁則上眞本生之號虚暎之官來監試於兆身若見黄炁則洞生之號虚暎之官來衛兆身若見白炁則南嶽所使之官虚暎之炁來結兆身通眞也此悉無恠依本行事久久道自感而降也若見黒炁則空中太魔之精來干試兆眞也兆當叩左齒三十六通誦玄章滅魔之祝一遍則魔精自滅眞自降也凡入西嶽思西方白帝神閉眼即見眞形者其人則胇有金闕六宫納眞通幽逹靈廻釋玄元内無礙滯外無欲塵故名書金格録字上清此人皆上仙之才也故道爲之即降神明爲之感㑹則仙不移年而成也若見白炁亦其正神虚暎之炁也則道有漸也若見黄炁則上眞本生之號虚暎之官監試於兆身若見黑炁則洞生之官虚暎之炁來衛兆身也若見青炁則西嶽所使之官虚暎之炁來結兆身通眞也此悉無恠依本而行事久久自當感眞而降焉若見赤炁則空中大魔之精來干試兆眞也兆當叩左齒三十六通誦金玄章滅魔之祝一遍則魔精自滅眞形自降也凡入北嶽思北方黒帝神閉眼即見眞形者其人則玄挺摽晨五心結絡炁叅紫天玄書北元刻簡青宫朗照幽室通神逹微此人皆上仙之才也故道爲之則降神明爲之感㑹則仙不移年而成也若見黒炁亦其正神虚暎之炁也則道有漸也若見白炁則上眞本生之號虚暎之官監試於兆身若見青炁則洞生之官虚暎之炁來衛兆身也若見赤炁則北嶽所使之官虚暎之炁來給兆通眞也此悉無恠依本而行事久久自當感眞而降焉若見黄炁則空中大魔之精來干試兆眞也兆當叩左齒三十六通誦金玄滅魔之祝一遍則魔精自滅眞形自降也凡入中嶽思中央黄帝神閉眼即見眞形者其人則絳府生華赤子納仙理幽綜滯味景霄清名書帝室圖影三元此人皆上仙之才也故道爲之即降神明爲之感㑹則仙不移年而成也若見黄炁亦其正神虚暎之炁也則道有漸也若見赤炁則上眞本生之號虚暎之官監試於兆身若見白炁則洞生之官虚暎之炁來衛兆身也若見黒炁則中嶽所使之官虚暎之炁來給兆通眞也此悉無恠依本而行事久久自當感眞而降焉若見青炁則空中大魔之精來干試兆眞也兆當叩左齒三十六通誦金玄之章滅魔之祝一遍則魔精自滅眞形自降也
