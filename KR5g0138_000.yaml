body:
  text: 五嶽内思刻名定仙上法太上九赤鎭嶽求仙班符東嶽青帝内思甲乙入木九炁班符東方青帝君姓常諱精萌頭建九元通天冠衣青錦帔碧飾飛帬佩太上九炁命靈之章帶翠羽交靈之綬常以立春之日乗碧霞九龍雲輿從青腰玉女十二人手把青林之華九色杖幡遊行東嶽太山校定眞人仙官録札時詣東海水帝考筭學道功過罪目廻降佩符者身學者服其符以招其人存其炁以降其眞求削水帝之簡上名玉札之篇當以立春之日平旦沐浴齋靜入室燒香服甲乙入木九炁班符叩齒九通思東方青帝君姓常諱精萌衣服形色乗碧霞雲輿下降兆房青炁鬱鬱覆蒲一室冠匝已形存見帝君青炁之中化爲赤光如歳星之精赫赫照明從頭頂而下入兆身中光明洞暎肝部之間便引炁九咽覺身中薰熱須㬰赤光於内散從九孔中出廻合還兆頭頂之上化成青雲覺兆身在青雲之中隨雲而昇良久覺定豁如蹈空便仰呪曰太丹隱齋廻合九門玄虚舉眞赤班早分帶甲入木乗乙御雲上制五嶽封丘召山下告九河十二水源落除宿簡列奏玉篇掌録我眞青帝之君降我碧霞飛青羽帬與帝合景奏謁玉晨畢又叩齒十二通咽液二十四遍止行之九年則能書符投山山降雲雨儵歘晻冥書符投水水上蛟龍能入萬丈之淵如行人中書符於木削之不滅其文轉明帶符抱木身成山林東嶽衛以仙官十二人一十八年則能飛行上清輕泄此道罰以鬼兵殃延七祖身没河源太上甲乙入木九炁班符朱書立春之日平旦東向服之祝如上法又以正月二月甲寅乙卯之日青書桐板之上令廣九寸長一尺二寸埋之所住東嶽令深九尺甲乙唯一日也如此法三年一埋不必年年也但存思服御依節行之亦九年無不感降也此一名白羽中林飛天九符一名九變三合成一得見其文與五帝同眞埋符之日當東向叩齒三十六通存思青炁之雲覆冠一山上下鬱冥東嶽太山君乗九色之龍手執青羽之麾從太山仙官十二人在青炁之内監暎兆身仰祝曰天通地理二炁交眞九赤陽明四度開陳上開五帝東嶽泰山下告萬靈無鞅之神削我宿對記我此篇滅消魔試使我成仙封賞靈嶽與炁同煙興雲降雨飛霄碧軒昇入玄虚髙皇帝前畢埋符如式仰引青炁三十六咽止東嶽泰山君常以春分之日列奏眞仙巳得道及始學之人名録上言髙上帝君檢校玄名修飛仙之道當以其日日出之時沐浴齋戒燒香入室東向思東嶽泰山君姓玄丘諱目陸頭建三寳九光夜冠衣青羽章帬披九色班裘帶上皇命神之篆乗青雲飛輿九色蒼龍從十二仙官手把五芝東北而廻上登無崖之上玉清之天徘徊玄虚之内青雲之中當叩齒九通心言今日上節八願開新願廻神曲來降我間納我所求奏我所陳得上玉札位係紫篇道君廻暎我獲上仙畢思泰山君乗輿下降青炁鬱鬱覆滿一室君處青炁之中手執青簡注上我名於青簡之篇微祝曰玉眞徘徊煥明東方乗龍駕輿飛行太空廻靈曲暎下降我房青陽告始上願開通納我所陳削過記功刻名青簡列奏髙皇西龜結録東華勒方五靈輔翼八帝齊光來甲御乙出木入空六丁侍衛玉女扶將攝山召海命制蛟龍嘯風興雲靡不立躬天魔伏試萬靈敬從變景化形上昇玉宫年享泰山永保無窮畢仰咽九炁止修之九年則泰山君見形於兆前降於青炁之雲給神童九人致自然神芝能知東方萬里之事一十八年則致龍輿乗空飛行上昇玉清宫南嶽赤帝内思丙丁入火三炁班符南方赤帝君姓炎諱洞丹頭建三炁玄梁寳冠衣緋雲錦袍丹文之帬佩南極制陽之符帶朱宫八光之劍常以立夏之日乗赤霞飈輪從太丹玉女十二人乗九色之鳯手把日精三炁之華遊行南嶽衡山校定眞人仙官録札及學者之名時詣南海水帝神王考筭學道功過罪目廻降佩符者身學者服其符以招其神存其炁以降其眞削除水帝之簡上名玉札之篇當以立夏之日正中沐浴齋戒入室燒香服丙丁入火三炁班符叩齒三通思南方赤帝君諱字衣服形色乗赤霞飈輪下降兆房赤炁赫赫覆滿一室冠匝已形存見帝君在赤炁之中化爲熒惑星赫赫照明從頭頂而下入兆身中光明洞暎心宫之間便引炁三咽覺身薰熱須㬰熒惑星於心散爲赤炁從九孔中出廻合還兆頭頂之上化成赤雲覺兆身在赤雲之中隨雲而昇良乆覺定豁如蹈空仰祝曰三炁廻元飛天九清白羽中林入微洞靈帶丙耀光乗火入丁中眞混合上化景星制御萬炁封山召靈符攝九河十二水精削滅九隂宿簡之名興雲降龍丹霄朱軿八景迅虚流火鬱冥飛輪紫蓋来運我形乗虚躡浮上造玉庭受錬洞陽五神鮮明永享天眉與帝合并畢又叩齒九通咽液十二過止行之九年則能書符投林林自生火書符投水水上蛟龍書符投山山降雲雨帶符入火身則不然埋符南嶽則得仙官侍衛兆身十八年則能飛行上昇玉清輕泄此道殃延七祖身没鬼官長閉地獄不得成仙太上丙丁入火三炁班符朱書立夏之日正中南向服之祝如上法又以四月五月丙午丁巳之日朱書桐板之上令廣八寸長一尺二寸埋之所住南嶽令深八尺丙丁唯一日也如此法三年一埋不年年也但存思服御依節行之亦九年赤帝君衡山君無不降見於兆形也此一名三合成道九眞中符一名九合入微幽虚七變得見其文五帝齊眞刻成上仙埋符之時當南向叩齒二十四通存思赤炁之雲覆冠一山之上南嶽衡山君乗赤龍雲車手執赤羽之節從衡山仙官十二人在赤炁之中監暎兆身仰呪曰丹靈洞陽上總天逢九變三合乃成道宫赤景班符威御萬方令日上節三炁開通上關五帝告文靈峯削我宿負列名髙皇使我道成變化玄空封掌靈嶽召海䇿龍興雲降雨萬向立從飛霄赤輪昇入帝房八炁并景三元齊光畢埋符如式仰引赤炁二十四咽止南嶽衡山君常以夏節之日列奏眞仙巳得道及始學之人名録上言髙上帝君檢校玄名區别功過修飛仙之道當以其日日中之時沐浴齋戒入室燒香南向思南嶽衡山君姓爓諱洋光頭建八朗寳光玉冠衣赤錦飛帬披神光緋文之表帶封靈制魔之章乗赤霞飛輪從南嶽仙官十二人悉乗飛鳳手把神芝東南而廻上登無崖之上玉清之天徘徊空虚之内赤雲之中當叩齒三通心言令日上吉良辰應眞玄願普降竟天納新願乞道君值廻上仙飛輪羽蓋下降我身道君廻降我成帝臣名言上清東華結篇畢思衡山君乗赤霞飛輪下降兆房赤炁鬱鬱覆滿一室君在赤炁之中手執赤簡注上我名於赤簡之篇微祝曰朱陽乗晨徘徊九霄丹輿飛蓋洞煥霞寥曲廻下暎監我心翹上願所陳莫不感幽抑披靈衛形與神交書名丹臺結字南瑶六丙翼眞乗丁入飈攝山封海命制萬祅千精伏竄羣魔皆消南嶽既掌三元来招降致朱軿昇入皇朝三景齊靈後天而凋畢仰咽三炁止修之九年則衡山君授兆寳書給仙官八人降致神芝竒異之物能知南方萬里之事行之十八年則致赤雲之輪飛行太空上昇玉清之宫西嶽白帝内思庚辛入金七炁班符西方白帝姓混諱辱歸頭建七炁明光寳冠衣白錦雲光之袍素錦飛帬佩素靈之綬龍潮澷誕之劍常以立秋之日乗素雲飛輿從太素玉女十二人白虎手把七色華旛遊行西嶽華山校定眞人仙官録札及學者之名時詣西海水帝神王考筭學道功過罪目廻降佩符者身學者服其符以招其人存其炁以降其眞削除水帝之簡上名玉札之篇當以立秋之日晡時沐浴齋靜入室燒香服庚辛入金七炁班符叩齒三通思西方白帝君諱字衣服形色乗紫雲飛輿下降兆房白炁奕奕覆滿一室冠帀巳形存見帝君在白炁之中化爲太白星赫赫照明從頭頂而下入兆身中光明洞暎肺部之間便引炁七咽覺身薰熱須㬰太白星於肺中散爲白炁從九孔中出廻合還兆頭頂之上化成白雲覺兆身在白雲之中隨雲而昇良久覺定豁如蹈空仰祝曰七炁飛精西華金靈龍變九道萬物自生日月過度飛羽陸冥幽虚玄眞三合七成變化入景辛廻景星帝諱符合變化我形上承皇威部御神兵制山檢海封嶽命精眞不咸來受事我庭興雲起雨降致素軿九龍七虎䇿御六丁迅我飛虎出玄入青上造朱月金治錬明逍遥華堂長保天經畢又叩齒七通咽液三十二過止行之九年則能書名於石錬石成金書符投石石隱兆形書符投山山降素雲書符投水水上龍精埋符西嶽則給仙官降致自然神竒異物一十八年修行則能乗空飛昇玉清輕泄此道罰以神兵七祖負考長役鬼官愼祕修行尅獲上仙太上庚辛入金七炁班符朱書立秋之日晡時西向服之祝如上法又以七月八月庚申辛酉之日朱書桐板之上令廣六寸長一尺二寸埋之所住西嶽令深六尺庚辛唯一日也如法三年一埋不年年也但存思服御依節行之爾九年白帝君及華山君無不降見於兆形也此一名九微入神封靈玄一名赤白自生七變金門得見此道西母降眞萬變立成飛昇帝神埋符之時當西向叩齒十二通存思白炁之雲覆冠一山之上西嶽華山君乗白龍雲車手執七色飛行羽節從華山仙官十二人在白炁之中監暎兆身仰祝曰六炁徊靈三合成一五雲變化轉九㑹七帝尊混合神生金室是時何時上願之日所向所求靡不良吉命靈召神羣魔隨滅八道散明我眞穆穆五嶽齊眉與帝相畢畢埋符如式仰白炁二十四咽止西嶽華山君常以秋分之日列奏眞仙巳得道及始學之人名録上言髙上帝君檢校玄名區别功過修飛仙之道當以其日晡時沐浴齋靜入室燒香西向思華山君姓浩丘諱元倉頭建六元通神飛冠衣白錦飛裙披素錦之裘帶交靈素綬乗霞飛輪從西嶽仙官十二人悉乗十二白虎手把七色華幡西南而廻上登無崖之上玉清之天徘徊空虚之内白雲之中當叩齒七通心言我願飛仙上昇玉清飛入華嶽與帝同靈乞丐道君降我眞形爲我致仙書我玄名畢思華山君乗白霞飛輪下降兆房白炁奕奕覆滿一室君在白炁之中手執白簡注上我名於白簡之篇微祝曰金門煥明白雲巍峩四㑹交眞八炁結羅上吉告晨帝靈昇霞廻神下降曲盻我家謂我白簡書名西華七眞部仙制御羣魔上承皇威攝山命河興雲降雨龍輪立過運我飛虚上造靈阿所願立至所剪立嵯千變萬化洞明玄霞畢仰咽七炁止修之九年則華山君爲兆致神仙之藥給仙童七人九年能明西方萬里之事吉凶之兆行之十八年降致白雲之輪飛行太空上昇玉清之宫北嶽黒帝内思壬癸入水五炁班符北方黒帝君姓玄諱朔萌頭建五炁玄晨之冠衣玄錦之袍五色飛帬佩七元流鈴帶文身通神之劍常以立冬之日乗玄雲飛輿從太玄玉女十二人乗十二飛龜手把五色華旛遊行北嶽拒山校定眞人仙官録札及學者之名時詣北海水帝神王考筭學道功過罪目廻降佩者身學者服其符以招其神存其炁以降其眞削水帝之簡上名玉札之篇當以立冬之日夜半沐浴齋靜入室燒香服壬癸水五炁班符叩齒五通思北方黒帝君諱字衣服色形象乗玄雲飛輿下降兆房黒炁勃勃覆滿一室冠帀已形存見帝君在黒炁之中化爲辰星赫赫照明從頭頂而下入兆身中光明洞暎腎部之間便引炁五咽覺身薰熱須㬰辰星於腎中散爲黒炁從九孔中出廻合還兆頭頂之上化成黑雲覺兆身在黒炁之中隨雲而昇良久覺定豁如蹈空仰祝曰五神通眞化炁廣陽七元廻靈煥落北方帝尊吿令入節御光上總萬仙下統無窮乗炁迅虚廻降我房授我玄符變化流通帶壬入洞負癸昇空封掌五嶽制命九江召山興雨符水上龍飛軿紫蓋昇入帝宫畢又叩齒五通咽液十八過止行之九年則能書符投水水上蛟龍停流止波入水如空埋符北嶽則給仙官降致神藥不死之方一十八年坐在立亡乗虚飛行上昇玉清其道髙妙不傳非眞輕泄靈文七祖負考身没鬼官長充幽徒不得又仙太上壬癸水五炁班符朱書立冬之日夜半北向服之祝如上法又以十月十一月壬子癸亥之日朱書桐板之上令廣五寸長一尺二寸埋之所住北嶽令深五尺壬癸唯一日也如此法三年一埋不年年也但存思服御依節行之爾九年黒帝君及恒山君降見於兆形也此一名交昇雲門七變五合一名五靈玄隂中道萬畢有得此文仙道立成行之變景飛昇紫清埋符之時當北向叩左齒二十四通存思黒炁之雲覆冠一山之上北嶽𢘆山君乘黒龍雲車手執五色飛仙羽節從𢘆山仙官十二人在黒炁之中監暎兆身仰祝曰玄武交昇五變成神三合九離乃㑹玉門上節八願我享其仙安炁鎮靈五嶽保令乘空命虚萬魔来身降致雲輿玄輦紫軒飛行太空上昇帝晨長與北君保命天眞畢埋符如式仰引黒炁二十四咽止北嶽𢘆山君常以冬至之日列奏眞仙巳得道及始學之人名録上言髙上帝君檢校玄名區别功過修飛仙之道當以其日夜半沐浴齋靜入室燒香北向思𢘆山君姓伏諱通萌頭建五炁寳晨玉冠衣黒錦飛帬披玄文明光之裘帶交靈紫綬乘玄霞飛輪北嶽仙官十二人悉乘飛龜手把五色華憣西北而廻上登無崖之上玉清之天徘徊空虚之内玄雲之中當叩齒五通心言今日上吉八節廻還道君廻降曲盻我身領掌命録長保天年畢思𢘆山君乘黒霞飛輪下降兆房黒炁勃勃覆滿一室君在黒炁之中手執紫簡注上我名於紫簡之篇微祝曰玄隂廻靈乗日御晨五炁總眞普統羣仙安景上宫徘徊雲陳曲降監暎来我房軒書名玄簡記上玉篇使我通明洞徹入眞制命五靈封河召山降龍起雨導雲興煙飛霄輕輪昇入帝晨畢仰咽五炁止修之九年則𢘆山君爲兆降致玄龍雲輿給以仙官五人招北方神眞靈藥洞明北方未然之事吉㐫之兆行之十八年飛行上清與北嶽帝君齊保玉眞也中嶽黄帝内思戊巳入土一炁班符中央黄帝君姓麻諱忠慎頭建黄晨通天玉冠衣黄錦之袍玄黄飛雲錦帬佩黄帝越元之䇿帶靈飛紫綬常以太𡻕之日乗黄雲飛輿從黄素玉女十二人乘十二飛驎手把五帝華幡遊行中嶽嵩山校定眞人仙官録札及學者之名時詣三河四海十二水帝神王考筭學道功過罪目廻降佩符者身學者服其符以招其神存其炁以降其眞削字水帝之簡上名玉札之篇當以太歳之日中後沐浴齋靜入室燒香服戊已入土一炁班符叩齒十二通思中央黄帝君諱字衣服形色乗黄雲飛輿下降兆房黄炁鬱鬱覆滿一室冠帀已形存見帝君在黄炁之中化爲鎭星赫赫照明從頭頂而下入兆身中光明洞暎脾部之間便引炁十二咽覺身薰熱須㬰鎭星於脾中散爲黄炁從九孔中出廻合還兆頭頂之上化成黄雲覺兆身在黄雲之中隨雲而昇良久覺定豁如蹈空仰祝曰中靈黄元十二飛精五炁混化髙皇洞明是日上吉總攝萬靈檢録校札除罪結生廻眞流盻曲降我庭爲我落死刻簡紫名輔我太眞給我神兵匡制五嶽封山召靈羣魔滅試我道肅清乗戊負已洞入無形興雲降雨飛霄紫軿造晏五嶽與帝合并畢又叩齒十二通咽炁十二過止行之九年則知三十六國之音知萬淵之下三十六土皇形色書符把玉形與土合埋符中嶽則使黄素玉女十二人致自然之厨不死之藥行之十八年則能飛行玄虚上昇玉清祕之神仙輕泄九祖獲考身負三徒充責幽冥太上戊已入土一炁班符朱書太歳之日日中後向四季服之祝如上法又以三月六月九月十二月戊辰戊戌已丑已未之日朱書桐板之上令廣三寸長一尺二寸埋之所住中央令深一尺二寸四季唯一日如此法三年一埋不年年也但存思服御依日而行之九年黄帝嵩髙山君無不降見於兆形也此一名玄眞總暉自生萬度一名神飛九道靈變自然有得此道立昇雲宫埋符之時當向四季叩齒十二通存思黄炁之雲覆冠一山之上中嶽山君乘黄龍雲車手執玄黄十二節麾從嵩髙山仙官十二人在黄炁之中監暎兆身仰祝曰三素流飈黄雲五纏道合萬變玄虚舉眞神安靈嶽道降我身黄白早分記名紫篇封山召河制御羣仙興雲降雨黄霄飛輪乗空歩玄上昇髙晨畢埋符如式仰行黄炁十二咽止中嶽嵩髙山君以三月六月九月十二月戊辰戊戌已丑已未之日列奏眞仙已得道及始學之人名録上言髙上帝君檢校玄名區别功過修飛仙之道當以其日日中後沐浴齋靜入室燒香向四季思中嶽君姓角諱普生頭建中元黄晨玉冠衣黄錦飛帬披玄黄文裘帶黄神中皇之章乗黄霞飛輪從中嶽仙官十二人悉乗飛驎手把玄黄十二節麾西南而廻上登無崖之上玉清宫徘徊空虚之中黄雲之内叩齒十二通心言天垂上願我享其恩念虚降靈思微致仙中嶽之君結我同軒使我飛行昇到金門畢思嵩髙山君乗黄霞飛輪下降兆房黄炁勃勃覆滿一室君在黄炁之中手執黄簡注上我名於黄簡之上微祝曰黄靈中玄道翳紫天三合成一結虚而仙掌録保篇固命度年列名東華記仙中秦五靈監暎使我道鮮出虚入微洞徹九玄身生水火變景億千乘空𡵯虚飛行無間畢仰咽十二炁止修之九年則與中嶽君對面共言爲兆降致黄龍飛輿給以仙官取自然之物以與兆身行之十八年道成飛仙上昇玉清四海水帝内思除罪削簡上法太上九赤封海通眞班符東海水帝九源青炁班符太上九元青炁班符常以立春春分之日分平旦朱書青紙上東向服之行事訖朱書符桐板上記某年某月某日子某郡縣某郷里某嶽先生某年若干𡻕某月生於符下以青石九兩青絲纏之著符下投之東流之水常以其日清齋入室燒香東向叩齒十二通思東海水帝神王姓王諱度源頭建太晨寳明之冠衣青文翠羽飛帬帶七色師子虎頭鞶囊乗碧輦飛龍從東海水帝十二仙掾乗十二蒼龍飛行上詣髙皇玉帝徘徊青雲廻降我身青炁鬱鬱内外晻冥神王對坐我前削我死簡注我仙録微祝曰洞淵九源上參玉清分流二炁混合同生上總上眞下典兆名是日良吉八願齊并水帝削罪記功上靈太一固年保命黄寧形交九都炁應神精左役天甲右運六丁命山召海降輿龍軿運我飛昇上朝三清羽儀翼翼金璫玲玲徘徊𡵯空遊宴紫庭下觀水宫水受我形使我長存與劫同齡畢服符仰咽液九過止便依法投符東流之淵行之十八年水帝削兆罪簡言玉清降致龍軿飛行太空身入萬丈之淵與水帝對言玄妙之道不得妄宣也南海水帝洞源赤炁班符太上洞源赤炁班符常以立夏夏至之日正中朱書青紙上南向服之行事訖朱書符桐板上記某年某月某日子某郡縣某郷里某嶽先生某年若干𡻕某月生於符下以赤石八兩赤絲纏之著符投於南流之水行其道常以其日清齋入室燒香南向叩齒十二通思南海水帝神王姓開諱納靈頭建太晨寳明之冠衣赤錦文帬帶交靈紫綬九色鞶囊乗蛟龍飛行雲輪從南海水帝十二仙掾乗十二飛龍上詣髙皇玉帝徘徊青雲廻降我身青炁鬱冥神王對坐我前削我罪簡注我仙録微祝曰南陽赤淵萬谷洞泉帝君安鎭總領水仙挍定罪簡記功紫晨日吉時清匡龍䇿煙徘徊玄虚來降我軒與炁混合道成自然制魔滅精攝海封山六師啓道通我水源興雲降雨嘯命立前所願所唘靡不如言飛行上清朝謁玉晨畢仰咽炁八過止便依法投符南流之淵行之十八年水官無復罪目之簡神王列名於玉皇降致雲龍丹輿飛行太空登山渉海萬神衛迎洞微入玄與帝合眞輕泄靈文罰以五帝神兵祕之者仙西海水帝洞淵白炁班符太上洞淵白炁班符常以立秋秋分之日晡時朱書青紙上西向服之行事訖朱書符桐板上記某年某月某日某郡縣某郷里某嶽先生某年若干𡻕某日生於符下以白石六兩白絲纏之著符投於西流之水行其道當以其日清齋入室燒香西向叩齒十二通思西海水帝神王姓道諱洞清頭建太晨寳明之冠衣素錦飛帬帶素靈命神之章九色師虎頭鞶囊乗飛輿從西海水帝十二仙掾乗十二白虎飛行玄虚上詣髙皇玉帝徘徊玄空青雲之中廻眞下降對在我前削我罪簡注我仙録列奏玉帝之前微祝曰暘谷萬文洞淵九流十二帝府九江水侯上統玉虚下領神州是日上吉神王出遊掌我命籍保我玄符廻眞曲暎来降我廬削我罪簡勒上天書道彂自然飈昇雲輿混合元吉與帝并軀畢仰咽六炁止便依法投符西流之淵行之十八年則能洞行西海履萬丈之淵海神衛迎不拘水契降致龍輿飛行太虚水官削罪言名帝皇其道髙妙不行於世有見其文不學自仙北海水帝洞川黒炁班符太上洞川黒炁班符以立冬冬至之日夜半時朱書青紙上北向服之行事訖朱書符於桐板上記某年某月某日某郡縣某郷里某嶽先生姓某年若干𡻕某月生於符下以黒石五兩黒絲纏之著符投於北流之水行其道當以其日清齋入室燒香北向叩齒十二通思北海水帝神王姓噏諱淵元頭建太晨寶明之冠衣玄錦飛裙帶豁落七元五色虎頭鞶囊乗玄霞飛輿從北海水帝十二仙掾乗十二飛龜遊行玄虚上詣髙皇玉帝徘徊玄靈之上鬱鬱青炁之中廻眞下降對在我前削我罪簡注我玉篇列言上清玉皇帝前便微祝曰天地分流四瀆御清三河水府九江帝靈檢定簡録結罪四明有道者功有過者刑今日上吉帝暎我庭流眞廻降我仙自成三河四海来衛我形千變萬化應口立生飛行玄虚上昇八冥長保三光天地齊停畢仰咽八炁止便依法投符北海之淵行之十八年命召水侯十二蛟龍運水興雲使白日闇冥飛行虚空上昇玉清其法髙妙非眞勿行違禁妄傳殃滅兆身考延七玄唯祕神仙太上九赤班符結飛玄紫炁以成其文上眞帝君以封嶽召山攝江制靈其文洞微煥落上清元始天王藏之於瑶臺金房玉虚之中舊科七千年一傳自無金名玉字丹文玄臺不得參聞有見其文尅成上仙當依法八節之日服符禮祝并埋山投海九年之中則五嶽仙官侍衛兆身水帝水靈隨方伺迎五帝奏名玄宫水官落滅罪書龍降雲覆變化無方又當依常彩色書符佩身登山履川萬神衛形滅魔消試威制羣精五雲降室紫煙自生項負圎光内外洞明八景齊眞三元降軿飛行玄虚上昇玉清有金名玉骨寳字上清得有此符佩之三年便得爲五嶽眞人履川渉海便爲四海君王五帝輔翼萬神敬迎修行其事九年則能水行萬丈制御蛟龍入山隱學則五帝五嶽見形共言興雲起雨立召龍煙千變萬化應響已成修之十八年飛行上清其道髙妙不行於世輕泄靈文七祖充責已身亡命長保鬼官受者弟子師對齋三十日或七日齎上金三兩五色文繒各五十尺錦四十尺上香一斤詣五嶽之巖告五帝關五靈三河四海天官地官水官依四極之盟然後而傳受者不關天靈侍經玉童玉女列奏髙上罰以五帝神兵輕泄者罰於九祖考滅巳身受而不盟殃延七祖身被風火自然失經故上元君告於五帝經非盟而不告受不關而失眞彼此皆有生死之責學者宜依文而奉焉道無不降仙無不成生死享其慶福流於種親靈文至重斯道之極眞也太上九赤班符五帝内眞經
